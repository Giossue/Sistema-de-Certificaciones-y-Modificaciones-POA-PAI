version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: poa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: poa_user
      POSTGRES_PASSWORD: poa_password
      POSTGRES_DB: poa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poa_user -d poa_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: poa-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://poa_user:poa_password@db:5432/poa_db?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - NODE_ENV=${NODE_ENV}
      - API_PORT=3001
      - API_HOST=0.0.0.0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: poa-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
